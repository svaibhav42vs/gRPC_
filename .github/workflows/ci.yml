name : CI

on:
  push:
   branches:
     - main
     - develop

  pull_request:

jobs:
  build:
   
    runs-on: ubuntu:latest
     
    steps:
      - uses : actions/checkout@v4

      - uses: actions/setup-java@v4
        with : 
         distribution: termur.in
         java-version: 21

      - name: Build
        run: mvn cean verify  